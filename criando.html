<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evolve Code Studio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: #1e293b;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      border-bottom: 2px solid #334155;
    }

    header h1 {
      font-size: 22px;
      color: #38bdf8;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    select {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.03);
    }

    select {
      background: #334155;
      color: white;
      border: 1px solid #475569;
    }

    .danger-btn {
      background: #ef4444;
      color: white;
    }

    .warning-btn {
      background: #f59e0b;
      color: white;
    }

    .secondary-btn {
      background: #64748b;
      color: white;
    }

    .success-btn {
      background: #22c55e;
      color: white;
    }

    .hidden {
      display: none;
    }

    #user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #334155;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
    }

    #user-info button {
      background: #ef4444;
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .project-nav {
      background: #1e293b;
      padding: 10px 15px;
      border-bottom: 2px solid #334155;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .project-name-badge {
      background: #334155;
      color: #38bdf8;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: bold;
    }

    .main-layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .sidebar {
      width: 320px;
      background: #111827;
      border-right: 2px solid #334155;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sidebar-header {
      padding: 12px;
      border-bottom: 2px solid #334155;
      background: #1e293b;
    }

    .sidebar-header h3 {
      font-size: 16px;
      color: #38bdf8;
      margin-bottom: 10px;
    }

    .sidebar-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-actions-row {
      display: flex;
      gap: 8px;
    }

    .file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .tree-item {
      margin-bottom: 6px;
      border-radius: 8px;
      background: #1f2937;
      overflow: hidden;
      border: 1px solid transparent;
    }

    .tree-item.active {
      border-color: #38bdf8;
    }

    .tree-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
    }

    .tree-label {
      flex: 1;
      cursor: pointer;
      font-size: 14px;
      word-break: break-word;
    }

    .tree-folder .tree-label {
      font-weight: bold;
      color: #fbbf24;
    }

    .tree-file .tree-label {
      color: #e2e8f0;
    }

    .tree-file.active {
      background: #0b2942;
    }

    .tree-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .mini-btn {
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 12px;
      background: #475569;
      color: white;
      border: none;
      cursor: pointer;
    }

    .mini-btn:hover {
      opacity: 0.9;
      transform: none;
    }

    .mini-danger {
      background: #ef4444;
    }

    .mini-warning {
      background: #f59e0b;
    }

    .folder-files {
      padding: 0 8px 8px 16px;
    }

    .editor-preview-wrapper {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .editor-section {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 2px solid #334155;
      min-height: 0;
    }

    .editor-header {
      background: #1e293b;
      padding: 12px;
      border-bottom: 2px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .editor-file-name {
      font-weight: bold;
      color: #38bdf8;
    }

    .editor-meta {
      font-size: 13px;
      color: #cbd5e1;
    }

    textarea {
      flex: 1;
      width: 100%;
      resize: none;
      border: none;
      outline: none;
      padding: 15px;
      font-family: Consolas, monospace;
      font-size: 14px;
      background: #0f172a;
      color: #f8fafc;
    }

    .preview-section {
      width: 50%;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .preview-header {
      background: #1e293b;
      padding: 12px;
      border-bottom: 2px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: white;
    }

    .bottom-actions {
      background: #1e293b;
      padding: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      border-top: 2px solid #334155;
    }

    /* TERMINAL */
    .terminal-panel {
      background: #020617;
      border-top: 2px solid #334155;
      display: none;
      flex-direction: column;
      height: 260px;
    }

    .terminal-panel.active {
      display: flex;
    }

    .terminal-header {
      background: #111827;
      padding: 10px 12px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .terminal-title {
      color: #22c55e;
      font-weight: bold;
      font-size: 14px;
    }

    .terminal-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .terminal-output {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      font-family: Consolas, monospace;
      font-size: 13px;
      color: #e2e8f0;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .terminal-line {
      margin-bottom: 6px;
    }

    .terminal-success {
      color: #22c55e;
    }

    .terminal-error {
      color: #ef4444;
    }

    .terminal-info {
      color: #38bdf8;
    }

    .login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.88);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .login-message {
      background: #1e293b;
      padding: 30px;
      border-radius: 14px;
      text-align: center;
      color: white;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.45);
      max-width: 380px;
      width: 90%;
    }

    .login-message p {
      margin-bottom: 18px;
      font-size: 16px;
      line-height: 1.5;
    }

    .login-message button {
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    @media (max-width: 1200px) {
      .main-layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        max-height: 300px;
      }

      .editor-preview-wrapper {
        flex-direction: column;
      }

      .editor-section,
      .preview-section {
        width: 100%;
        height: 50vh;
      }

      header {
        justify-content: center;
      }
    }

    /* Estilos do Modal */
    .user-info_modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 15px;
      padding: 30px;
      width: 90%;
      max-width: 400px;
      z-index: 1000;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      animation: modalFadeIn 0.3s ease;
      display: none;
    }

    .user-info_modal.show {
      display: block;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      display: none;
      animation: overlayFadeIn 0.3s ease;
    }

    .modal-overlay.show {
      display: block;
    }

    @keyframes overlayFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .user-info_modal .user-name {
      text-align: center;
      margin-bottom: 20px;
    }

    .user-info_modal .user-name span {
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }

    .user-info_modal .user-image {
      text-align: center;
      margin-bottom: 20px;
    }

    .user-info_modal .user-image img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #667eea;
      padding: 3px;
    }

    .user-info_modal .user-info {
      border-top: 1px solid #e0e0e0;
      padding-top: 20px;
    }

    .user-info_modal .user-info p {
      margin: 10px 0;
      color: #555;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-info_modal .user-info p:before {
      content: "📧";
      font-size: 16px;
    }

    .user-info_modal .user-info p:last-child:before {
      content: "📱";
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #f44336;
      color: white;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .close-modal:hover {
      background: #d32f2f;
      transform: scale(1.1);
    }

    .btn-modal {
      background: #38bdf8;
      color: #0f172a;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-modal:hover {
      opacity: 0.9;
      transform: scale(1.03);
    }

    @media (max-width: 480px) {
      .user-info_modal {
        width: 95%;
        padding: 20px;
      }

      .user-info_modal .user-name span {
        font-size: 20px;
      }

      .user-info_modal .user-image img {
        width: 80px;
        height: 80px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>🚀 Evolve Code Studio</h1>

    <div class="top-buttons">
      <button onclick="window.location.href='index.html'">← Voltar</button>
      <button id="newProjectBtn">Novo Projeto</button>
      <button id="downloadProjectBtn" class="succes-btn">Baixar Projeto</button>
      <button id="renameProjectBtn">Renomear Projeto</button>
      <button id="deleteProjectBtn" class="danger-btn">Excluir Projeto</button>
      <!-- <button id="openUserModalBtn" class="btn-modal">👤 Informações do Usuário</button> -->
    </div>
  </header>

  <!-- NAVEGAÇÃO ENTRE PROJETOS -->
  <div class="project-nav">
    <button id="prevProjectBtn">⬅ Projeto Anterior</button>
    <select id="projectSelector"></select>
    <button id="nextProjectBtn">Projeto Próximo ➡</button>
    <span class="project-name-badge" id="currentProjectBadge">Projeto: Meu Projeto</span>
  </div>

  <div class="main-layout app-container">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>📁 Explorador Profissional</h3>
        <div class="sidebar-actions">
          <div class="sidebar-actions-row">
            <button id="createFolderBtn">+ Pasta</button>
            <button id="createFileBtn">+ Arquivo</button>
          </div>
        </div>
      </div>
      <div id="fileTree" class="file-tree"></div>
    </div>

    <!-- EDITOR + PREVIEW -->
    <div class="editor-preview-wrapper">
      <div class="editor-section">
        <div class="editor-header">
          <div>
            <div class="editor-file-name" id="currentFileName">index.html</div>
            <div class="editor-meta" id="currentFileMeta">Arquivo aberto no editor</div>
          </div>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button id="renameFileBtn" class="warning-btn">Renomear Arquivo</button>
            <button id="deleteFileBtn" class="danger-btn">Excluir Arquivo</button>
            <button id="openTerminalBtn" class="success-btn">🐍 Abrir Terminal Python</button>
          </div>
        </div>

        <textarea id="codeEditor" placeholder="Selecione ou crie um arquivo..."></textarea>

        <!-- TERMINAL PYTHON -->
        <div id="terminalPanel" class="terminal-panel">
          <div class="terminal-header">
            <span class="terminal-title" id="terminalTitle">Terminal Python</span>
            <div class="terminal-actions">
              <button id="runPythonBtn" class="success-btn">▶ Rodar Python</button>
              <button id="clearTerminalBtn" class="secondary-btn">Limpar Terminal</button>
              <button id="closeTerminalBtn" class="danger-btn">Fechar</button>
            </div>
          </div>
          <div id="terminalOutput" class="terminal-output"></div>
        </div>
      </div>

      <div class="preview-section">
        <div class="preview-header">
          <h3>Preview</h3>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button id="refreshPreviewBtn">Atualizar Preview</button>
            <button id="openMainFilesBtn" class="secondary-btn">Abrir Arquivos Principais</button>
          </div>
        </div>
        <iframe id="preview"></iframe>
      </div>
    </div>
  </div>

  <div class="bottom-actions">
    <button id="runBtn">▶ Executar</button>
    <button id="copyBtn">Copiar Código Atual</button>
    <button id="clearBtn" class="danger-btn">Limpar Arquivo Atual</button>
    <button id="resetBtn" class="danger-btn">Resetar Projeto</button>
  </div>

  <!-- Modal com informações do usuário -->
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="user-info_modal" id="userModal">
    <button class="close-modal" id="closeModalBtn">×</button>
    <div class="user-name">
      <span id="userNameDisplay"></span>
    </div>
    <div class="user-image">
      <img id="userImageDisplay" src="" alt="User Image">
    </div>
    <div class="user-info">
      <p id="userEmailDisplay"></p>
      <p id="userPhoneDisplay"></p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="js/editor.js"></script>

</body>

</html>
