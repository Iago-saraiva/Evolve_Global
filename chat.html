<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot Evolve_Global - Nosso Assistente Inteligente</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 90%;
            max-width: 600px;
            height: 90vh;
            max-height: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .chat-header h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .status {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #4caf50;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            white-space: nowrap;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .api-key-panel {
            padding: 14px 20px;
            background: #f7f8fc;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .api-key-input {
            display: none !important;
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cfd8e3;
            border-radius: 25px;
            font-size: 0.95rem;
            outline: none;
            font-family: inherit;
        }

        .save-api-button {
            display: none !important;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 22px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .save-api-button:hover {
            background: #5a6dd3;
        }

        .api-status {
            width: 100%;
            color: #555;
            font-size: 0.82rem;
            text-align: center;
            margin-top: 6px;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            resize: none;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 0 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .clear-button {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 0 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .clear-button:hover {
            background: #d32f2f;
        }

        @media (max-width: 768px) {
            .chat-container {
                width: 95%;
                height: 95vh;
            }
            .message-content {
                max-width: 85%;
            }
        }
        
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .btn-voltar button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🤖 Assistente Gemini AI | Evolve Global</h2>
            <p>Powered by Google Gemini 2.5 Flash Lite</p>
            <div class="status">Online</div>
        </div>

        <div class="api-key-panel">
            <input class="api-key-input" id="apiKeyInput" type="password" placeholder="Chave da API Google Gemini"
                autocomplete="off">
            <button class="save-api-button" id="saveApiKeyButton">Salvar chave</button>
            <div class="api-status" id="apiStatus">✅ API pré-configurada! Pronto para usar.</div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    Olá! 👋 Sou o Assistente Gemini AI da Evolve Global.<br><br>
                    Como posso ajudar?<br><br>
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <textarea class="chat-input" id="messageInput" placeholder="Digite sua mensagem..." rows="1"
                autocomplete="off"></textarea>
            <button class="send-button" id="sendButton">Enviar</button>
            <button class="clear-button" id="clearButton">Limpar</button>
        </div>
    </div>
    <div class="footer">
        <div class="btn-voltar">
            <button onclick="window.location.href='index.html'">← Voltar</button>
        </div>
    </div>

    <script>
        // CHAVE API DO GMEINI AI
        const DEFAULT_API_KEY = "AQ.Ab8RN6K0AP8L2-FweyRortn4WSq_PIE2O_oCxjFl_Ss3bK24sQ";
        
        
        class ChatBot {
            constructor() {
                this.messagesContainer = document.getElementById('chatMessages');
                this.messageInput = document.getElementById('messageInput');
                this.sendButton = document.getElementById('sendButton');
                this.clearButton = document.getElementById('clearButton');
                this.saveApiKeyButton = document.getElementById('saveApiKeyButton');
                this.apiKeyInput = document.getElementById('apiKeyInput');
                this.apiStatus = document.getElementById('apiStatus');

                this.conversationHistory = [];
                this.isTyping = false;
                this.apiKey = '';
                this.lastMessageTime = 0;
                this.waitTime = 0;
                this.waitInterval = null;
                this.workingModel = null;

                this.init();
            }

            init() {
                // Tentar carregar chave salva primeiro
                let savedKey = localStorage.getItem('geminiApiKey');
                
                // Se não tiver chave salva, usar a chave padrão (se configurada)
                if (!savedKey && DEFAULT_API_KEY && DEFAULT_API_KEY !== "AQ.Ab8RN6K0AP8L2-FweyRortn4WSq_PIE2O_oCxjFl_Ss3bK24sQ") {
                    savedKey = DEFAULT_API_KEY;
                    localStorage.setItem('geminiApiKey', savedKey);
                }
                
                if (savedKey) {
                    this.apiKey = savedKey;
                    this.apiKeyInput.value = '***************';
                    this.apiStatus.textContent = '✅ Gemini AI conectado! Pronto para conversar.';
                    this.apiStatus.style.color = '#4caf50';
                    
                    // Testar conexão automaticamente
                    setTimeout(() => this.testConnection(), 500);
                } else {
                    this.apiStatus.textContent = '⚠️ Chave de API não configurada.';
                    this.apiStatus.style.color = '#ff9800';
                }

                this.sendButton.onclick = () => this.sendMessage();
                this.clearButton.onclick = () => this.clearChat();
                this.saveApiKeyButton.onclick = () => this.saveApiKey();

                this.messageInput.onkeypress = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                };

                this.messageInput.oninput = () => {
                    this.messageInput.style.height = 'auto';
                    this.messageInput.style.height = Math.min(this.messageInput.scrollHeight, 100) + 'px';
                };
            }

            async sendMessage() {
                const message = this.messageInput.value.trim();

                if (!message) return;
                if (!this.apiKey) {
                    this.addMessage("⚠️ Chave de API não configurada, fale com o suporte.", 'bot');
                    return;
                }
                if (this.isTyping) return;

                if (this.waitTime > 0) {
                    this.addMessage(`⏳ Aguarde ${this.waitTime} segundos antes de enviar outra mensagem.`, 'bot');
                    return;
                }

                const now = Date.now();
                const timeSinceLastMessage = (now - this.lastMessageTime) / 1000;
                
                if (this.lastMessageTime > 0 && timeSinceLastMessage < 15) {
                    const remainingWait = Math.ceil(15 - timeSinceLastMessage);
                    this.addMessage(`⏳ Por favor, aguarde ${remainingWait} segundos entre as mensagens.`, 'bot');
                    return;
                }

                this.addMessage(message, 'user');
                this.messageInput.value = '';
                this.messageInput.style.height = 'auto';

                this.conversationHistory.push({ role: "user", parts: [{ text: message }] });

                this.showTypingIndicator();
                this.isTyping = true;
                this.sendButton.disabled = true;

                try {
                    const response = await this.askGemini(message);
                    this.addMessage(response, 'bot');
                    this.conversationHistory.push({ role: "model", parts: [{ text: response }] });
                    this.lastMessageTime = Date.now();
                } catch (error) {
                    console.error('Erro:', error);
                    
                    // Mensagem de erro mais amigável
                    let errorMsg = error.message;
                    if (errorMsg.includes('API key not valid') || errorMsg.includes('invalid')) {
                        errorMsg = 'Chave API inválida. Verifique sua chave no Google AI Studio.';
                        this.apiStatus.textContent = '❌ Chave inválida! Corrija no campo acima.';
                        this.apiStatus.style.color = '#f44336';
                    } else if (errorMsg.includes('quota')) {
                        errorMsg = 'Limite de uso gratuito excedido. Aguarde alguns minutos e tente novamente.';
                    }
                    
                    this.addMessage(`❌ ${errorMsg}`, 'bot');
                    
                    const match = error.message.match(/Please retry in ([0-9.]+)s/);
                    if (match) {
                        const waitSeconds = Math.ceil(parseFloat(match[1]));
                        this.startWaitTimer(waitSeconds);
                    }
                } finally {
                    this.removeTypingIndicator();
                    this.isTyping = false;
                    this.sendButton.disabled = false;
                }

                if (this.conversationHistory.length > 20) {
                    this.conversationHistory = this.conversationHistory.slice(-20);
                }
            }

            startWaitTimer(seconds) {
                this.waitTime = seconds;
                this.sendButton.disabled = true;
                
                this.addMessage(`⏳ API sobrecarregada. Aguardando ${seconds} segundos para nova tentativa...`, 'bot');
                
                this.waitInterval = setInterval(() => {
                    this.waitTime--;
                    
                    if (this.waitTime <= 0) {
                        clearInterval(this.waitInterval);
                        this.waitInterval = null;
                        this.sendButton.disabled = false;
                        this.addMessage(`✅ Período de espera concluído! Você já pode enviar novas mensagens.`, 'bot');
                    }
                }, 1000);
            }

            async askGemini(message, retryCount = 0) {
                const modelsToTry = this.workingModel 
                    ? [this.workingModel] 
                    : [
                        'gemini-2.5-flash-lite',
                        'gemini-2.5-flash',
                        'gemini-2.0-flash-lite'
                      ];
                
                let lastError = null;
                
                for (const model of modelsToTry) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${this.apiKey}`;

                        const contents = this.conversationHistory.length > 0
                            ? this.conversationHistory
                            : [{ role: "user", parts: [{ text: message }] }];

                        const requestBody = {
                            contents: contents,
                            generationConfig: {
                                temperature: 0.7,
                                maxOutputTokens: 800,
                                topP: 0.95,
                            }
                        };

                        const response = await fetch(url, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(requestBody)
                        });

                        const data = await response.json();

                        if (response.ok) {
                            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                            if (text) {
                                if (!this.workingModel) {
                                    this.workingModel = model;
                                    console.log(`✅ Modelo funcionando: ${model}`);
                                }
                                return text;
                            }
                        } else if (response.status === 429) {
                            const errorMsg = data.error?.message || '';
                            const match = errorMsg.match(/Please retry in ([0-9.]+)s/);
                            if (match && retryCount === 0) {
                                const waitSeconds = parseFloat(match[1]);
                                this.startWaitTimer(Math.ceil(waitSeconds));
                                throw new Error(errorMsg);
                            }
                            lastError = errorMsg;
                        } else {
                            lastError = data.error?.message || 'Erro desconhecido';
                            console.log(`❌ Modelo ${model} falhou: ${lastError}`);
                        }
                    } catch (error) {
                        lastError = error.message;
                    }
                }
                
                throw new Error(lastError || 'Nenhum modelo disponível. Verifique sua chave API.');
            }

            saveApiKey() {
                const key = this.apiKeyInput.value.trim();

                if (!key) {
                    localStorage.removeItem('geminiApiKey');
                    this.apiKey = '';
                    this.workingModel = null;
                    this.apiStatus.textContent = '⚠️ Chave removida. Insira uma nova chave para continuar.';
                    this.apiStatus.style.color = '#ff9800';
                    this.apiKeyInput.value = '';
                    return;
                }

                if (!key.startsWith('AIza')) {
                    this.apiStatus.textContent = '❌ Chave inválida!';
                    this.apiStatus.style.color = '#f44336';
                    return;
                }

                localStorage.setItem('geminiApiKey', key);
                this.apiKey = key;
                this.workingModel = null;
                this.apiStatus.textContent = '✅ Chave salva! Testando conexão...';
                this.apiStatus.style.color = '#ff9800';
                this.apiKeyInput.value = '***************';

                this.testConnection();
            }

            async testConnection() {
                try {
                    const testResponse = await this.askGemini("Responda apenas 'Conectado' se você receber esta mensagem.");
                    this.apiStatus.textContent = '✅ Gemini AI conectado com sucesso!';
                    this.apiStatus.style.color = '#4caf50';
                    this.addMessage(`✅ Conexão estabelecida com sucesso! Uso atual: ${this.workingModel || 'Gemini 2.5 Flash Lite'}\n\nComo posso ajudar você hoje? 😊`, 'bot');
                } catch (error) {
                    this.apiStatus.textContent = `❌ Erro de conexão: ${error.message.substring(0, 80)}`;
                    this.apiStatus.style.color = '#f44336';
                    this.addMessage(`❌ Falha na conexão: ${error.message}\n\nVerifique se sua chave está correta e tente novamente.`, 'bot');
                }
            }

            addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';

                let formattedText = text.replace(/\n/g, '<br>');
                formattedText = formattedText.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#667eea;">$1</a>');
                contentDiv.innerHTML = formattedText;

                messageDiv.appendChild(contentDiv);
                this.messagesContainer.appendChild(messageDiv);
                this.scrollToBottom();
                return messageDiv;
            }

            showTypingIndicator() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message bot';
                typingDiv.id = 'typingIndicator';
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
                typingDiv.appendChild(contentDiv);
                this.messagesContainer.appendChild(typingDiv);
                this.scrollToBottom();
            }

            removeTypingIndicator() {
                const indicator = document.getElementById('typingIndicator');
                if (indicator) indicator.remove();
            }

            clearChat() {
                this.messagesContainer.innerHTML = '';
                this.conversationHistory = [];
                this.lastMessageTime = 0;
                
                if (this.waitInterval) {
                    clearInterval(this.waitInterval);
                    this.waitInterval = null;
                    this.waitTime = 0;
                    this.sendButton.disabled = false;
                }

                const initialMessage = document.createElement('div');
                initialMessage.className = 'message bot';
                initialMessage.innerHTML = `
                    <div class="message-content">
                        💬 Chat limpo! Como posso ajudar você hoje?<br><br>
                        🧠 Gemini AI - Modelo ativo: ${this.workingModel || 'Gemini 2.5 Flash Lite'}<br>
                        ⏰ Aguarde 15 segundos entre cada mensagem.
                    </div>
                `;
                this.messagesContainer.appendChild(initialMessage);
                this.scrollToBottom();
            }

            scrollToBottom() {
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            window.chatBot = new ChatBot();
        });
    </script>
</body>

</html>
